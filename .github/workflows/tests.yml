name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test with mock mode
      run: |
        python main.py --mock --input "테스트 요구사항" > /tmp/mock_test.log 2>&1
        echo "Mock mode test completed"

    - name: Run pytest with coverage
      run: |
        pytest tests/ --cov=. --cov-report=term-missing --cov-report=html --cov-report=xml

    - name: Upload coverage reports
      if: matrix.python-version == '3.11'
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: htmlcov/

    - name: Check coverage threshold
      if: matrix.python-version == '3.11'
      run: |
        python -c "
        import re
        with open('htmlcov/index.html', 'r', encoding='utf-8') as f:
            content = f.read()
            match = re.search(r'<span class=\"percentage\">([\d.]+)%</span>', content)
            if match:
                coverage = float(match.group(1))
                print(f'Coverage: {coverage}%')
                if coverage < 60:
                    print('⚠️  Coverage below 60%')
            else:
                print('Could not parse coverage from HTML')
        "

    - name: Summary
      if: always()
      run: |
        echo "✅ Test Summary"
        echo "Python: ${{ matrix.python-version }}"
        echo "Status: Tests completed"
