version: '3.8'

services:
  # Multi-Agent 앱 서비스
  app:
    build: .
    image: multi-agent-app:offline
    container_name: multi-agent-app
    ports:
      - "8000:8000"
    env_file:
      - .env.offline
    volumes:
      # 분석 결과 저장
      - ./output:/app/output
      # 로그 저장
      - ./logs:/app/logs
      # 프로젝트 저장 (Phase 6)
      - ./projects:/app/projects
      # 데이터베이스 영구 저장
      - analysis_db:/app/analysis_history.db
    # Ollama 서비스가 healthy 상태가 될 때까지 대기
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Ollama LLM 서비스
  ollama:
    image: ollama/ollama:latest
    container_name: multi-agent-ollama
    ports:
      - "11434:11434"
    # 모델 데이터 영구 저장
    volumes:
      - ollama_models:/root/.ollama
    # Ollama 서비스 헬스 체크
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - ai-network

# 명명된 볼륨 (데이터 영구 저장)
volumes:
  # Ollama 모델 데이터
  ollama_models:
    driver: local
  # 분석 이력 데이터베이스
  analysis_db:
    driver: local

# 커스텀 네트워크 (app과 ollama가 내부 통신용)
networks:
  ai-network:
    driver: bridge
