services:
  # Multi-Agent 앱 서비스
  app:
    build: .
    image: multi-agent-app:offline
    container_name: multi-agent-app
    ports:
      - "8000:8000"
    env_file:
      - .env.offline
    volumes:
      # 분석 결과 저장
      - ./output:/app/output
      # 로그 저장
      - ./logs:/app/logs
      # 프로젝트 저장 (Phase 6)
      - ./projects:/app/projects
      # 데이터베이스 영구 저장
      - analysis_db:/app/analysis_history.db
    # Ollama 서비스가 시작되기만 하면 app도 시작 (app이 올라가면서 올라마 준비 대기)
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Ollama LLM 서비스
  ollama:
    image: ollama/ollama:latest
    container_name: multi-agent-ollama
    ports:
      - "11434:11434"
    # 모델 데이터 영구 저장
    volumes:
      - ollama_models:/root/.ollama
    # Ollama 서비스 헬스 체크
    # ⚠️ 주의: 첫 실행 시 모델 다운로드(10-20분) 필요하므로 start_period를 충분히 길게 설정
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s  # 첫 실행: 5분 대기 후 헬스 체크 시작 (모델 다운로드 중)
    restart: unless-stopped
    networks:
      - ai-network

# 명명된 볼륨 (데이터 영구 저장)
volumes:
  # Ollama 모델 데이터
  ollama_models:
    driver: local
  # 분석 이력 데이터베이스
  analysis_db:
    driver: local

# 커스텀 네트워크 (app과 ollama가 내부 통신용)
networks:
  ai-network:
    driver: bridge
