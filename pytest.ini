[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=. --cov-report=term-missing --cov-report=html

[coverage:run]
branch = True
omit =
    .venv/*
    tests/*
    setup.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
